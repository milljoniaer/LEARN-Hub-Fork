# Application Configuration
spring.application.name=learn-hub-server

# Config
spring.config.import=optional:file:../.env[.properties]

# Server Configuration
server.port=${SERVER_PORT:5001}

# Environment (local, staging, production)
app.environment=${ENVIRONMENT:local}

# Database Configuration
spring.datasource.url=${POSTGRES_DB_URI:jdbc:postgresql://localhost:5432/learn_hub_activities}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

app.db-seed.enabled=${DB_SEED_ENABLED:false}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
# Serialize/deserialise dates in UTC
spring.jackson.time-zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# Spring AI Ollama Configuration
spring.ai.ollama.base-url=${LLM_BASE_URL:https://gpu.aet.cit.tum.de/ollama}
spring.ai.ollama.chat.options.model=${LLM_MODEL_NAME:qwen3:30b-a3b}
spring.ai.ollama.chat.options.temperature=0.1
spring.ai.ollama.chat.options.num-predict=2048
spring.ai.ollama.init.chat.additional-models=[qwen3:30b-a3b]

# Custom Ollama API Key (for authentication header)
ollama.api.key=${LLM_API_KEY:REDACTED}

# JWT Configuration (provide at least 32 bytes; default is intentionally long)
jwt.secret=${JWT_SECRET_KEY:change_me_to_a_very_long_and_secure_jwt_secret_key_value}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Email Configuration
spring.mail.host=${SMTP_SERVER:postout.lrz.de}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${EMAIL_USERNAME:your_email@example.com}
spring.mail.password=${EMAIL_PASSWORD:your_email_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true
email.from-address=${EMAIL_ADDRESS:your_email@example.com}
email.from-name=${EMAIL_SENDER_NAME:LEARN-Hub Team}

# PDF Storage Configuration
pdf.storage.path=${PDF_PATH:/app/data/pdfs}

# Security Configuration
spring.security.debug=true

# CORS Configuration
cors.allowed-origins=*

# OpenAPI Configuration
springdoc.api-docs.path=/api/openapi
springdoc.swagger-ui.path=/api/openapi/swagger
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.learnhub=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.mail.javamail=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web.client.RestClient=DEBUG
logging.level.org.springframework.http.client=TRACE
